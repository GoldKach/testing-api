version: '3.8'

services:
  frontend:
    build:
      context: ../goldkach-investment-web-system
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api.goldkach.co.ug/api/v1
        NEXT_PUBLIC_RECAPTCHA_SITE_KEY: 6LcUgGwsAAAAADH_gT_AzLYN2hDzUWk2N5-rpE7G
    container_name: goldkach-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://api.goldkach.co.ug/api/v1
    networks:
      - app-network

  api:
    build:
      context: .
      dockerfile: dockerfile
    container_name: goldkach-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    networks:
      - app-network

networks:
  app-network:
    driver: bridge